<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Icon Options</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&display=swap');

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background:
          radial-gradient(circle, rgba(105, 87, 67, 0.13) 1.1px, transparent 1.2px) 0 0 / 24px 24px,
          #f5ecd9;
        color: #4a4036;
        font-family: 'Playfair Display', Georgia, serif;
      }

      main {
        width: min(860px, 100%);
        margin: 0 auto;
        padding: 34px 18px 52px;
      }

      h1 {
        margin: 0 0 22px;
        font-size: 30px;
        font-weight: 500;
      }

      .grid {
        display: grid;
        gap: 18px;
      }

      .option {
        border: 1px solid rgba(74, 64, 54, 0.12);
        border-radius: 24px;
        background: rgba(255, 252, 246, 0.72);
        box-shadow: 0 18px 38px rgba(74, 64, 54, 0.14);
        padding: 14px;
      }

      .label {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin: 0 4px 10px;
        font-size: 15px;
        color: rgba(74, 64, 54, 0.72);
      }

      .nav {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        border: 1px solid rgba(74, 64, 54, 0.11);
        border-radius: 22px;
        background: rgba(255, 252, 246, 0.64);
        padding: 7px;
      }

      .item {
        position: relative;
        display: flex;
        height: 68px;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 3px;
        border-radius: 18px;
        color: rgba(74, 64, 54, 0.58);
        font-size: 12px;
      }

      .item.active {
        background: rgba(255, 250, 239, 0.86);
        color: #4a4036;
        box-shadow: inset 0 0 0 1px rgba(74, 64, 54, 0.08);
      }

      .bubble {
        display: flex;
        width: 40px;
        height: 30px;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
      }

      .active .bubble {
        background: rgba(232, 148, 150, 0.18);
        color: #df8f91;
      }

      .scribble {
        position: absolute;
        bottom: 8px;
        width: 40px;
        height: 9px;
      }

      .scribble::before,
      .scribble::after {
        content: '';
        position: absolute;
        height: 6px;
        border-radius: 999px;
        background: rgba(223, 143, 145, 0.42);
      }

      .scribble::before {
        left: 2px;
        top: 2px;
        width: 34px;
        transform: rotate(-3deg);
      }

      .scribble::after {
        left: 0;
        top: 0;
        width: 40px;
        transform: rotate(2deg);
        opacity: 0.75;
      }

      svg {
        width: 22px;
        height: 22px;
        fill: none;
        stroke: currentColor;
        stroke-width: 2.35;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .soft svg {
        stroke-width: 2.15;
      }

      .chunky svg {
        stroke-width: 2.85;
      }

      .sticker svg .fill {
        fill: currentColor;
        opacity: 0.18;
      }

      .doodle svg {
        stroke-width: 2.45;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Bottom Tab Icon Options</h1>
      <div class="grid">
        <section class="option soft">
          <div class="label"><span>A. Soft outline</span><span>清爽一点</span></div>
          <div class="nav">
            <div class="item active">
              <span class="bubble">
                <svg viewBox="0 0 24 24"><path d="M12 6v15" /><path d="M4 5.5a3 3 0 0 1 3-2h5v17H7a3 3 0 0 0-3 2Z" /><path d="M20 5.5a3 3 0 0 0-3-2h-5v17h5a3 3 0 0 1 3 2Z" /></svg>
              </span>
              <span>Diary</span><span class="scribble"></span>
            </div>
            <div class="item">
              <span class="bubble">
                <svg viewBox="0 0 24 24"><path d="M6.5 8.5h11l1 11.5h-13Z" /><path d="M9 8.5V6.8a3 3 0 0 1 6 0v1.7" /></svg>
              </span>
              <span>Shopping</span>
            </div>
            <div class="item">
              <span class="bubble">
                <svg viewBox="0 0 24 24"><path d="M10 4h4v6h6v4h-6v6h-4v-6H4v-4h6Z" /></svg>
              </span>
              <span>Medical</span>
            </div>
          </div>
        </section>

        <section class="option doodle">
          <div class="label"><span>B. Doodle</span><span>更手画</span></div>
          <div class="nav">
            <div class="item active">
              <span class="bubble">
                <svg viewBox="0 0 24 24"><path d="M6 5.5c2-.9 4-.9 6 .2v14c-2-1-4-1-6-.2Z" /><path d="M12 5.7c2-1.1 4-1.1 6-.2v14c-2-.8-4-.8-6 .2" /><path d="M8 9.5c.8-.3 1.5-.2 2.2.1" /><path d="M14 9.6c.8-.3 1.5-.3 2.2 0" /></svg>
              </span>
              <span>Diary</span><span class="scribble"></span>
            </div>
            <div class="item">
              <span class="bubble">
                <svg viewBox="0 0 24 24"><path d="M7 9.5c.2-2.2 1.6-3.5 3.4-3.5h3.2c1.8 0 3.2 1.3 3.4 3.5" /><path d="M5.5 9.2h13l-.7 10.5H6.2Z" /><path d="M9 13h6" /><path d="M9.5 16h4" /></svg>
              </span>
              <span>Shopping</span>
            </div>
            <div class="item">
              <span class="bubble">
                <svg viewBox="0 0 24 24"><path d="M8.3 15.7 15.7 8.3a3.1 3.1 0 1 1 4.4 4.4l-7.4 7.4a3.1 3.1 0 1 1-4.4-4.4Z" /><path d="m12 12 4 4" /></svg>
              </span>
              <span>Medical</span>
            </div>
          </div>
        </section>

        <section class="option sticker">
          <div class="label"><span>C. Sticker fill</span><span>更可爱</span></div>
          <div class="nav">
            <div class="item active">
              <span class="bubble">
                <svg viewBox="0 0 24 24"><path class="fill" d="M5 5c2.3-1.2 4.7-1.2 7 .1 2.3-1.3 4.7-1.3 7-.1v16c-2.3-1.1-4.7-1.1-7 .1-2.3-1.2-4.7-1.2-7-.1Z" /><path d="M5 5c2.3-1.2 4.7-1.2 7 .1v16c-2.3-1.2-4.7-1.2-7-.1Z" /><path d="M12 5.1c2.3-1.3 4.7-1.3 7-.1v16c-2.3-1.1-4.7-1.1-7 .1" /></svg>
              </span>
              <span>Diary</span><span class="scribble"></span>
            </div>
            <div class="item">
              <span class="bubble">
                <svg viewBox="0 0 24 24"><path class="fill" d="M6 8h12l1 12H5Z" /><path d="M6 8h12l1 12H5Z" /><path d="M9 8V6a3 3 0 0 1 6 0v2" /><path d="M9 12h6" /></svg>
              </span>
              <span>Shopping</span>
            </div>
            <div class="item">
              <span class="bubble">
                <svg viewBox="0 0 24 24"><path class="fill" d="M8 5h8v4h4v10H4V9h4Z" /><path d="M8 5h8v4h4v10H4V9h4Z" /><path d="M12 9v6M9 12h6" /></svg>
              </span>
              <span>Medical</span>
            </div>
          </div>
        </section>

        <section class="option chunky">
          <div class="label"><span>D. Chunky simple</span><span>更醒目</span></div>
          <div class="nav">
            <div class="item active">
              <span class="bubble">
                <svg viewBox="0 0 24 24"><path d="M5 6h14v13H5Z" /><path d="M8 9h8" /><path d="M8 13h5" /></svg>
              </span>
              <span>Diary</span><span class="scribble"></span>
            </div>
            <div class="item">
              <span class="bubble">
                <svg viewBox="0 0 24 24"><path d="M4 10h16l-2 10H6Z" /><path d="M8 10c0-3 1.5-5 4-5s4 2 4 5" /></svg>
              </span>
              <span>Shopping</span>
            </div>
            <div class="item">
              <span class="bubble">
                <svg viewBox="0 0 24 24"><path d="M6 12h12" /><path d="M12 6v12" /><path d="M5 5h14v14H5Z" /></svg>
              </span>
              <span>Medical</span>
            </div>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
